<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudNotes — Three-Tier Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-grid"></div>

<main class="wrap">

  <header class="brand">
    <span class="brand-mark">☁</span>
    <span class="brand-name">CloudNotes</span>
    <span class="brand-tag">3-tier demo</span>
  </header>

  <section id="view-login" class="card">
    <h1>Sign in</h1>
    <p class="sub">Web tier &rarr; App tier &rarr; DB tier, all in one login.</p>

    <form id="login-form" novalidate>
      <label for="login-username">Username or email</label>
      <input id="login-username" name="username" type="text" autocomplete="username" required>

      <label for="login-password">Password</label>
      <input id="login-password" name="password" type="password" autocomplete="current-password" required>

      <button type="submit" class="btn-primary">Sign in</button>
    </form>

    <p class="msg" id="login-msg"></p>
    <p class="switch">No account yet? <a href="#" id="go-register">Create one</a></p>
  </section>

  <section id="view-register" class="card hidden">
    <h1>Create account</h1>
    <p class="sub">Takes a minute. Your data lands straight in MySQL.</p>

    <form id="register-form" novalidate>
      <label for="reg-username">Username</label>
      <input id="reg-username" name="username" type="text" autocomplete="username" required minlength="3">

      <label for="reg-email">Email</label>
      <input id="reg-email" name="email" type="email" autocomplete="email" required>

      <label for="reg-password">Password</label>
      <input id="reg-password" name="password" type="password" autocomplete="new-password" required minlength="6">

      <button type="submit" class="btn-primary">Create account</button>
    </form>

    <p class="msg" id="register-msg"></p>
    <p class="switch">Already have an account? <a href="#" id="go-login">Sign in</a></p>
  </section>

  <section id="view-dashboard" class="card hidden">
    <div class="dash-head">
      <div>
        <h1>Welcome, <span id="dash-username">—</span></h1>
        <p class="sub">You're authenticated end to end via the app tier.</p>
      </div>
      <button id="logout-btn" class="btn-ghost">Log out</button>
    </div>

    <form id="note-form" class="note-form">
      <input id="note-input" type="text" placeholder="Write a quick note…" required>
      <button type="submit" class="btn-primary">Add</button>
    </form>

    <ul id="notes-list" class="notes-list"></ul>
    <p class="msg" id="dash-msg"></p>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
